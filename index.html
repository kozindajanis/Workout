<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Workout Log</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <meta name="theme-color" content="#000000" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3f0; --surface: #fff; --border: rgba(0,0,0,0.09);
      --border-strong: rgba(0,0,0,0.18); --text: #1a1a1a; --text-muted: #666;
      --text-faint: #bbb; --accent: #1a1a1a; --radius: 12px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111; --surface: #1c1c1c; --border: rgba(255,255,255,0.07);
        --border-strong: rgba(255,255,255,0.15); --text: #efefef; --text-muted: #888;
        --text-faint: #444; --accent: #efefef;
      }
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; font-size: 16px; line-height: 1.5; padding: 1.25rem 1rem 20vh; min-height: 100vh; }
    .container { max-width: 500px; margin: 0 auto; }
    header { margin-bottom: 1.25rem; }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    #date-line { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .day-selector { display: flex; gap: 6px; margin-bottom: 1rem; }
    .day-sel-btn { flex: 1; height: 44px; font-size: 14px; font-weight: 500; font-family: inherit; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); cursor: pointer; }
    .day-sel-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .section-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
    .section-header { padding: 0.75rem 1rem 0.5rem; border-bottom: 0.5px solid var(--border); }
    .day-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .ex-block { border-bottom: 0.5px solid var(--border); }
    .ex-block:last-child { border-bottom: none; }
    .ex-header { padding: 0.75rem 1rem 0.4rem; font-size: 15px; font-weight: 500; }
    .set-row { display: flex; align-items: center; gap: 8px; padding: 4px 1rem; width: 100%; }
    .set-label { font-size: 12px; color: var(--text-faint); width: 24px; flex-shrink: 0; text-align: center; }
    .set-row input { flex: 1; min-width: 0; height: 44px; padding: 0 8px; font-size: 16px; font-family: inherit; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); text-align: center; -webkit-appearance: none; }
    .set-row input::placeholder { color: var(--text-faint); font-size: 13px; }
    .set-row input:focus { outline: none; border-color: var(--text-muted); }
    .reps-in { max-width: 80px; }
    .rm-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--text-faint); font-size: 18px; cursor: pointer; flex-shrink: 0; border-radius: 50%; }
    .rm-btn:active { background: var(--border); }
    .add-set-row { padding: 6px 1rem 10px; }
    .add-set-btn { font-size: 13px; color: var(--text-muted); background: none; border: 0.5px dashed var(--border-strong); border-radius: var(--radius-sm); padding: 7px 16px; cursor: pointer; width: 100%; }
    .add-set-btn:active { background: var(--border); }
    .field-wrap { padding: 2px 1rem 8px; }
    .field-wrap input { width: 100%; height: 38px; padding: 0 10px; font-size: 14px; font-family: inherit; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); -webkit-appearance: none; }
    .field-wrap input::placeholder { color: var(--text-faint); font-size: 13px; }
    .notes-wrap { padding: 0.75rem 1rem; }
    textarea { width: 100%; font-size: 15px; font-family: inherit; padding: 10px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); resize: vertical; min-height: 80px; -webkit-appearance: none; }
    .copy-btn { display: block; width: 100%; height: 52px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius); margin-top: 0.5rem; }
    .copy-btn:active { opacity: 0.75; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>workout log</h1>
    <p id="date-line"></p>
  </header>

  <div class="day-selector">
    <button class="day-sel-btn active" onclick="selectDay('day1')">day 1</button>
    <button class="day-sel-btn" onclick="selectDay('day2')">day 2</button>
    <button class="day-sel-btn" onclick="selectDay('offday')">off day</button>
  </div>

  <div id="day1-card" class="section-card">
    <div class="section-header"><div class="day-label">day 1</div></div>
    <div id="day1-body"></div>
  </div>

  <div id="day2-card" class="section-card" style="display:none">
    <div class="section-header"><div class="day-label">day 2</div></div>
    <div id="day2-body"></div>
  </div>

  <div id="offday-card" class="section-card" style="display:none">
    <div class="section-header"><div class="day-label">off day</div></div>
    <div id="offday-body"></div>
  </div>

  <div class="section-card">
    <div class="section-header"><div class="day-label">notes</div></div>
    <div class="notes-wrap"><textarea id="notes-field" placeholder="energy, soreness, adjustments..."></textarea></div>
  </div>

  <button class="copy-btn" onclick="copyLog()">copy log</button>
</div>

<script>
  const day1Exercises = ["weighted pull-ups","incline bench","weighted dips","machine legs","cable rotation"];
  const day2Exercises = ["overhead press","lateral raises","barbell row","bicep curls","back extension holds","hinge"];
  const offdayExercises = ["handstand pushup","front lever","planche","pistol squat","one arm pull up"];
  const hasNotes = ["machine legs","hinge","cable rotation"];
  const isSeconds = ["back extension holds"];

  const state = { day1: {}, day2: {}, offday: {} };
  day1Exercises.forEach(e => state.day1[e] = [{kg:"",reps:""}]);
  day2Exercises.forEach(e => state.day2[e] = [{kg:"",reps:""}]);
  offdayExercises.forEach(e => state.offday[e] = [{reps:"",note:""}]);

  let activeDay = "day1";
  const now = new Date();
  document.getElementById("date-line").textContent = now.toLocaleDateString("en-GB",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

  function selectDay(day) {
    activeDay = day;
    document.querySelectorAll(".day-sel-btn").forEach((b,i) => b.classList.toggle("active",["day1","day2","offday"][i]===day));
    document.getElementById("day1-card").style.display = day==="day1" ? "" : "none";
    document.getElementById("day2-card").style.display = day==="day2" ? "" : "none";
    document.getElementById("offday-card").style.display = day==="offday" ? "" : "none";
  }

  function renderExercises(containerId, exercises, dayKey) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    const warmupBlock = document.createElement("div");
    warmupBlock.className = "ex-block";
    warmupBlock.innerHTML = `<div class="ex-header">warmup</div><div class="field-wrap"><input type="text" placeholder="e.g. stairmaster 5min 80spm..." data-warmup="${dayKey}"></div>`;
    container.appendChild(warmupBlock);
    exercises.forEach(exName => {
      const sets = state[dayKey][exName];
      const block = document.createElement("div");
      block.className = "ex-block";
      const header = document.createElement("div");
      header.className = "ex-header"; header.textContent = exName;
      block.appendChild(header);
      if (hasNotes.includes(exName)) {
        const nw = document.createElement("div"); nw.className = "field-wrap";
        const ni = document.createElement("input");
        ni.type = "text"; ni.placeholder = "exercise / notes"; ni.dataset.notesFor = exName;
        nw.appendChild(ni); block.appendChild(nw);
      }
      sets.forEach((set, setIdx) => {
        const row = document.createElement("div"); row.className = "set-row";
        const label = document.createElement("span"); label.className = "set-label"; label.textContent = `s${setIdx+1}`;
        const kgIn = document.createElement("input");
        kgIn.type = "text"; kgIn.inputMode = "decimal";
        kgIn.placeholder = isSeconds.includes(exName) ? "—" : "kg / bw"; kgIn.value = set.kg;
        kgIn.addEventListener("input", e => { state[dayKey][exName][setIdx].kg = e.target.value; });
        const repsIn = document.createElement("input");
        repsIn.type = "text"; repsIn.inputMode = "numeric";
        repsIn.placeholder = isSeconds.includes(exName) ? "sec" : "reps";
        repsIn.className = "reps-in"; repsIn.value = set.reps;
        repsIn.addEventListener("input", e => { state[dayKey][exName][setIdx].reps = e.target.value; });
        row.appendChild(label); row.appendChild(kgIn); row.appendChild(repsIn);
        if (sets.length > 1) {
          const rm = document.createElement("button"); rm.className = "rm-btn"; rm.textContent = "×";
          rm.onclick = () => { state[dayKey][exName].splice(setIdx,1); renderExercises(containerId,exercises,dayKey); };
          row.appendChild(rm);
        }
        block.appendChild(row);
      });
      const addRow = document.createElement("div"); addRow.className = "add-set-row";
      const addBtn = document.createElement("button"); addBtn.className = "add-set-btn"; addBtn.textContent = "+ add set";
      addBtn.onclick = () => { state[dayKey][exName].push({kg:"",reps:""}); renderExercises(containerId,exercises,dayKey); };
      addRow.appendChild(addBtn); block.appendChild(addRow);
      container.appendChild(block);
    });
  }

  function renderOffday(containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";
    offdayExercises.forEach(exName => {
      const sets = state.offday[exName];
      const block = document.createElement("div");
      block.className = "ex-block";
      const header = document.createElement("div");
      header.className = "ex-header"; header.textContent = exName;
      block.appendChild(header);
      const nw = document.createElement("div"); nw.className = "field-wrap";
      const ni = document.createElement("input");
      ni.type = "text"; ni.placeholder = "variation / notes"; ni.dataset.notesFor = exName;
      nw.appendChild(ni); block.appendChild(nw);
      sets.forEach((set, setIdx) => {
        const row = document.createElement("div"); row.className = "set-row";
        const label = document.createElement("span"); label.className = "set-label"; label.textContent = `s${setIdx+1}`;
        const repsIn = document.createElement("input");
        repsIn.type = "text"; repsIn.inputMode = "numeric";
        repsIn.placeholder = "reps"; repsIn.value = set.reps;
        repsIn.style.maxWidth = "none";
        repsIn.addEventListener("input", e => { state.offday[exName][setIdx].reps = e.target.value; });
        row.appendChild(label); row.appendChild(repsIn);
        if (sets.length > 1) {
          const rm = document.createElement("button"); rm.className = "rm-btn"; rm.textContent = "×";
          rm.onclick = () => { state.offday[exName].splice(setIdx,1); renderOffday(containerId); };
          row.appendChild(rm);
        }
        block.appendChild(row);
      });
      const addRow = document.createElement("div"); addRow.className = "add-set-row";
      const addBtn = document.createElement("button"); addBtn.className = "add-set-btn"; addBtn.textContent = "+ add set";
      addBtn.onclick = () => { state.offday[exName].push({reps:""}); renderOffday(containerId); };
      addRow.appendChild(addBtn); block.appendChild(addRow);
      container.appendChild(block);
    });
  }

  renderExercises("day1-body", day1Exercises, "day1");
  renderExercises("day2-body", day2Exercises, "day2");
  renderOffday("offday-body");

  function formatDay(dayKey, exercises) {
    const warmupEl = document.querySelector(`[data-warmup="${dayKey}"]`);
    const warmup = warmupEl ? `  warmup: ${warmupEl.value||"—"}\n` : "";
    return warmup + exercises.map(ex => {
      const sets = state[dayKey][ex];
      const setStr = sets.map((s,i) => `set ${i+1}: ${s.kg||"—"} × ${s.reps||"—"} ${isSeconds.includes(ex)?"sec":"reps"}`).join(", ");
      const noteEl = document.querySelector(`[data-notes-for="${ex}"]`);
      const note = noteEl ? ` (${noteEl.value||"—"})` : "";
      return `  ${ex}${note}: ${setStr}`;
    }).join("\n");
  }

  function formatOffday() {
    return offdayExercises.map(ex => {
      const sets = state.offday[ex];
      const setStr = sets.map((s,i) => `set ${i+1}: ${s.reps||"—"} reps`).join(", ");
      const noteEl = document.querySelector(`[data-notes-for="${ex}"]`);
      const note = noteEl && noteEl.value ? ` (${noteEl.value})` : "";
      return `  ${ex}${note}: ${setStr}`;
    }).join("\n");
  }

  function copyLog() {
    const dateStr = now.toLocaleDateString("en-GB",{year:"numeric",month:"long",day:"numeric"});
    const notes = document.getElementById("notes-field").value||"—";
    let text = "";
    if (activeDay==="day1") text = `workout log — ${dateStr}\n\nday 1\n${formatDay("day1",day1Exercises)}\n\nnotes: ${notes}`;
    else if (activeDay==="day2") text = `workout log — ${dateStr}\n\nday 2\n${formatDay("day2",day2Exercises)}\n\nnotes: ${notes}`;
    else text = `workout log — ${dateStr}\n\noff day\n${formatOffday()}\n\nnotes: ${notes}`;
    const btn = document.querySelector(".copy-btn");
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "copied!"; setTimeout(() => btn.textContent = "copy log", 2000);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.cssText = "position:fixed;opacity:0;top:0;left:0;";
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      btn.textContent = "copied!"; setTimeout(() => btn.textContent = "copy log", 2000);
    });
  }
</script>
</body>
</html>
